    <script>
      // Rename Task Tape to Cadence dynamically in the DOM
      const textObserver = new MutationObserver(() => {
        const walk = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        let n;
        while(n = walk.nextNode()) {
          if (n.nodeValue && n.nodeValue.includes('Task Tape')) {
            n.nodeValue = n.nodeValue.replace(/Task Tape/g, 'Cadence');
          }
          if (n.nodeValue && n.nodeValue.includes('TaskTape')) {
            n.nodeValue = n.nodeValue.replace(/TaskTape/g, 'Cadence');
          }
        }
        document.querySelectorAll('img[alt*="Task Tape"]').forEach(img => {
          img.alt = img.alt.replace(/Task Tape/g, 'Cadence');
        });
      });
      textObserver.observe(document.body, { childList: true, subtree: true, characterData: true });
    </script>
